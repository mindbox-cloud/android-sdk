name: Distribute PushOk (manual)

on:
  workflow_dispatch:
    inputs:
      app_ref:
        description: "GitLab App branch (Optional)"
        required: false
        default: ""

jobs:
  call-reusable:
    uses: ./.github/workflows/distribute-reusable.yml
    with:
      branch: ${{ github.ref_name }}
      app_ref: ${{ inputs.app_ref }}
    secrets: inherit
