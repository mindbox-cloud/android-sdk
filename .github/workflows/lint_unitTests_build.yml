name: Lint + UnitTests + Build

on:
  push:
    branches:
      - develop
      - mission/*
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  unit:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: unit tests
        run: ./gradlew --no-daemon --stacktrace :sdk:testDebugUnitTest --tests "cloud.mindbox.mobile_sdk.inapp.presentation.InAppMessageManagerTest"

      - name: test report
        uses: asadmansr/android-test-report-action@v1.2.0
        if: ${{ always() }}
